<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Security Service - Защита операций</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <h1>🔐 OTP Security Service</h1>

    <div id="authSection">
        <div class="card">
            <h2>Вход в систему</h2>
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="Логин" required>
                <input type="password" id="loginPassword" placeholder="Пароль" required>
                <button type="submit">Войти</button>
            </form>
            <p>Нет аккаунта? <a href="#" onclick="showRegister()">Зарегистрироваться</a></p>
        </div>

        <div class="card" id="registerCard" style="display:none">
            <h2>Регистрация</h2>
            <form id="registerForm">
                <input type="text" id="regUsername" placeholder="Логин" required>
                <input type="password" id="regPassword" placeholder="Пароль" required>
                <input type="email" id="regEmail" placeholder="Email">
                <input type="tel" id="regPhone" placeholder="Телефон">
                <button type="submit">Зарегистрироваться</button>
            </form>
            <p>Уже есть аккаунт? <a href="#" onclick="showLogin()">Войти</a></p>
        </div>
    </div>

    <div id="userPanel" style="display:none">
        <div class="header">
            <h2>Добро пожаловать, <span id="usernameDisplay"></span></h2>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>

        <div class="card" id="adminPanel" style="display:none">
            <h2>Панель администратора</h2>
            <div>
                <h3>Настройки OTP</h3>
                <label>Длина кода:</label>
                <input type="number" id="codeLength" value="6" min="4" max="8">
                <label>Время жизни (секунды):</label>
                <input type="number" id="ttlSeconds" value="300" min="30" max="600">
                <button onclick="updateConfig()">Обновить конфигурацию</button>
            </div>
            <div>
                <h3>Список пользователей</h3>
                <button onclick="loadUsers()">Загрузить пользователей</button>
                <div id="usersList"></div>
            </div>
        </div>

        <div class="card">
            <h2>Генерация OTP кода</h2>
            <select id="channel">
                <option value="email">Email</option>
                <option value="telegram">Telegram</option>
                <option value="sms">SMS (эмулятор)</option>
                <option value="file">Сохранить в файл</option>
            </select>
            <input type="text" id="destination" placeholder="Получатель (email/телефон)">
            <button onclick="generateOtp()">Сгенерировать код</button>
            <div id="generateResult"></div>
        </div>

        <div class="card">
            <h2>Проверка OTP кода</h2>
            <input type="text" id="operationId" placeholder="ID операции">
            <input type="text" id="otpCode" placeholder="Код подтверждения">
            <button onclick="validateOtp()">Проверить код</button>
            <div id="validateResult"></div>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
